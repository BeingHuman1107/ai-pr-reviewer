name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

# 🔥 REQUIRED: allow commenting on PR
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Get Diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Run AI Review
        run: node src/review.js

      # 🔥 Safer: ensure file exists before commenting
      - name: Comment PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            let review = "⚠️ AI review not generated";
            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt', 'utf8');
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });